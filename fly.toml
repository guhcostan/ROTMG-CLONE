# Fly.io config for Realm Reborn.
# Deploy:  fly launch --no-deploy   (then keep this file)  ->  fly volumes create realm_data --size 1 --region gru  ->  fly deploy
# The SQLite database lives on the mounted volume so it survives deploys/restarts.

app = "realm-reborn"          # change to a unique name (fly will reject duplicates)
primary_region = "gru"        # São Paulo; pick the region closest to your players

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DATA_DIR = "/app/data"
  NODE_ENV = "production"

# persistent disk for the SQLite database (create it once with `fly volumes create realm_data`)
[[mounts]]
  source = "realm_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true          # client auto-upgrades ws -> wss behind TLS
  auto_stop_machines = "stop" # scale to zero when idle (free-tier friendly)
  auto_start_machines = true  # wake on the next request
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
